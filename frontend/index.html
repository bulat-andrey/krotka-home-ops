<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Krotka Home Ops</title>
    <style>
        *{box-sizing:border-box;margin:0;padding:0}
        body{font-family:-apple-system,BlinkMacSystemFont,sans-serif;background:#f5f5f5;color:#333;margin:0;min-height:100vh}
        .hidden{display:none!important}
        button,input,select,textarea{font-size:16px}
        button{padding:12px 20px;border:none;border-radius:8px;background:#2196F3;color:#fff;cursor:pointer;min-height:44px}
        button:active{opacity:.8}
        input,select,textarea{width:100%;padding:10px;border:1px solid #ddd;border-radius:6px;margin-bottom:8px}
        textarea{resize:vertical;min-height:60px}
        .card{background:#fff;border-radius:10px;padding:14px;margin-bottom:10px;box-shadow:0 1px 3px rgba(0,0,0,.1)}
        .badge{display:inline-block;padding:3px 8px;border-radius:12px;font-size:12px;font-weight:600}
        .badge-green{background:#e8f5e9;color:#2e7d32}
        .badge-yellow{background:#fff8e1;color:#f57f17}
        .badge-red{background:#fbe9e7;color:#c62828}
        .badge-blue{background:#e3f2fd;color:#1565c0}
        .badge-gray{background:#eee;color:#555}
        h2{margin-bottom:12px;font-size:18px}
        h3{margin-bottom:8px;font-size:15px;color:#555}
        .alert{background:#fff3e0;border-left:4px solid #ff9800;padding:10px;margin-bottom:10px;border-radius:4px;font-size:14px}
        .alert-red{background:#fbe9e7;border-left-color:#f44336}
        #shell{max-width:480px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column}
        #app{flex:1;padding:12px;padding-bottom:70px}
        nav{position:fixed;left:0;right:0;bottom:0;background:#fff;border-top:1px solid #ddd;z-index:1000}
        .nav-inner{max-width:480px;margin:0 auto;display:flex;justify-content:flex-start;overflow-x:auto;-webkit-overflow-scrolling:touch}
        nav button{background:none;color:#666;font-size:11px;padding:8px 4px;border-radius:0;min-height:50px;flex:0 0 60px;display:flex;flex-direction:column;align-items:center;gap:2px}
        nav button.active{color:#2196F3}
        nav button span{font-size:20px}
        .list-item{padding:10px 0;border-bottom:1px solid #eee;font-size:14px}
        .list-item:last-child{border-bottom:none}
        .form-group{margin-bottom:10px}
        .form-group label{display:block;font-size:13px;color:#666;margin-bottom:4px}
        .login-wrap{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px}
        .login-box{background:#fff;padding:30px;border-radius:12px;width:100%;box-shadow:0 4px 12px rgba(0,0,0,.1)}
        .login-box h1{margin-bottom:20px;text-align:center}
        .lang-switch{display:flex;gap:8px;justify-content:flex-end;margin-bottom:10px}
        .lang-switch button{padding:8px 12px;min-height:auto;font-size:13px;background:#eceff1;color:#455a64}
        .lang-switch button.active{background:#2196F3;color:#fff}
        .toolbar-row{display:flex;align-items:center;justify-content:flex-end;gap:12px}
        .rec-head{display:flex;align-items:center;gap:8px;min-width:0}
        .zone-icon{width:18px;height:18px;display:inline-flex;align-items:center;justify-content:center;flex:0 0 18px;color:#2e7d32}
        .zone-icon svg{width:18px;height:18px;display:block;fill:currentColor}
        @media (max-width: 640px) {
            #app{padding-bottom:112px}
            nav{padding-bottom:env(safe-area-inset-bottom, 0px)}
        }
    </style>
</head>
<body>

<div id="login-screen" class="login-wrap">
    <div class="login-box">
        <h1>Krotka Home Ops</h1>
        <div class="lang-switch" id="login-lang-switch"></div>
        <input type="text" id="login-user" placeholder="" value="admin" autocomplete="username">
        <input type="password" id="login-pass" placeholder="">
        <button onclick="doLogin()" id="login-button" style="width:100%;margin-top:8px;"></button>
        <p id="login-error" class="hidden" style="color:red;margin-top:8px;font-size:14px;"></p>
    </div>
</div>

<div id="main-app" class="hidden">
    <div id="shell">
        <div id="app-toolbar" style="padding:12px 12px 0 12px;"></div>
        <div id="app"></div>
    </div>
    <nav>
        <div class="nav-inner">
            <button onclick="showTab('dashboard')" id="tab-dashboard"><span>&#127968;</span></button>
            <button onclick="showTab('zones')" id="tab-zones"><span>&#128205;</span></button>
            <button onclick="showTab('watering')" id="tab-watering"><span>&#128167;</span></button>
            <button onclick="showTab('mowing')" id="tab-mowing"><span>&#127807;</span></button>
            <button onclick="showTab('requests')" id="tab-requests"><span>&#128203;</span></button>
            <button onclick="showTab('finance')" id="tab-finance"><span>&#128176;</span></button>
            <button onclick="showTab('emails')" id="tab-emails"><span>&#128231;</span></button>
            <button onclick="showTab('events')" id="tab-events"><span>&#128218;</span></button>
            <button onclick="showTab('users')" id="tab-users" class="hidden"><span>&#128101;</span></button>
        </div>
    </nav>
</div>

function t(path) {
    return path.split('.').reduce((acc, key) => acc && acc[key], I18N[LANG]) || path;
}

function setLanguage(lang) {
    LANG = lang === 'pl' ? 'pl' : 'ru';
    localStorage.setItem('lang', LANG);
    document.documentElement.lang = LANG;
    renderLanguageSwitches();
    renderStaticLabels();
    if (document.getElementById('main-app') && !document.getElementById('main-app').classList.contains('hidden') && currentTab) {
        showTab(currentTab);
    }
}

function renderLanguageSwitches() {
    const html = ['ru', 'pl'].map(lang => '<button class="' + (LANG === lang ? 'active' : '') + '" onclick="setLanguage(\'' + lang + '\')">' + t('lang' + (lang === 'ru' ? 'Ru' : 'Pl')) + '</button>').join('');
    const loginSwitch = document.getElementById('login-lang-switch');
    if (loginSwitch) loginSwitch.innerHTML = html;
    const toolbar = document.getElementById('app-toolbar');
    if (toolbar) toolbar.innerHTML = '<div class="toolbar-row"><div class="lang-switch">' + html + '</div></div>';
}

function renderStaticLabels() {
    document.title = t('appTitle');
    document.getElementById('login-user').placeholder = t('loginUser');
    document.getElementById('login-pass').placeholder = t('loginPass');
    document.getElementById('login-button').textContent = t('login');
    document.getElementById('login-error').textContent = t('loginError');
    document.getElementById('tab-dashboard').innerHTML = '<span>&#127968;</span>' + t('tabs.dashboard');
    document.getElementById('tab-zones').innerHTML = '<span>&#128205;</span>' + t('tabs.zones');
    document.getElementById('tab-watering').innerHTML = '<span>&#128167;</span>' + t('tabs.watering');
    document.getElementById('tab-mowing').innerHTML = '<span>&#127807;</span>' + t('tabs.mowing');
    document.getElementById('tab-requests').innerHTML = '<span>&#128203;</span>' + t('tabs.requests');
    document.getElementById('tab-finance').innerHTML = '<span>&#128176;</span>' + t('tabs.finance');
    document.getElementById('tab-emails').innerHTML = '<span>&#128231;</span>' + t('tabs.emails');
    document.getElementById('tab-events').innerHTML = '<span>&#128218;</span>' + t('tabs.events');
    document.getElementById('tab-users').innerHTML = '<span>&#128101;</span>' + t('tabs.users');
}

function zoneTypeLabel(v) { return t('typeLabels.' + v) || v || ''; }
function sunLabel(v) { return t('sunLabels.' + v) || v || ''; }
function requestStatusLabel(v) { return t('requestStatus.' + v) || v || ''; }
function requestStatusShort(v) { return t('requestStatusShort.' + v) || v || ''; }
function eventLabel(v) { return t('eventLabels.' + v) || v || ''; }
function directionLabel(v) { return t('directionLabels.' + v) || v || ''; }
function recStatusLabel(v) { return t('recStatus.' + v) || v || ''; }
function translateRecommendationReason(reason) {
    if (!reason) return '';
    if (LANG !== 'pl') return reason;
    const map = [
        ['ожидается дождь', 'spodziewany deszcz'],
        ['полив не записан', 'brak wpisanego podlewania'],
        ['недавно уже был дождь', 'niedawno był już deszcz'],
        ['зона близко к поливу, но скоро ожидается дождь', 'strefa jest blisko podlewania, ale wkrótce spodziewany jest deszcz'],
        ['жара', 'upał'],
        ['пора поливать', 'czas podlewać'],
        ['порог зоны', 'próg strefy'],
        ['порог для зоны сейчас', 'próg dla strefy teraz'],
        ['дн. назад', 'dni temu']
    ];
    let out = reason;
    map.forEach(([from, to]) => { out = out.split(from).join(to); });
    return out;
}
function financeKindLabel(v) {
    return t('finance.' + (v === 'private' ? 'private' : 'reimbursable')) || v || '';
}
function financeStatusLabel(v) {
    return t('finance.' + (v === 'reimbursed' ? 'reimbursed' : v === 'not_needed' ? 'notNeeded' : 'pending')) || v || '';
}
function financeSummaryLabel(v) {
    return t('finance.' + v) || v || '';
}
function financeRequestLabel(v) { return v ? (LANG === 'pl' ? 'Zgłoszenie' : 'Заявка') : ''; }
function yesNo(v) { return v ? t('yes') : t('no'); }
function wateringMethodLabel(v) {
    const map = LANG === 'pl'
        ? {'дождеватель': 'Zraszacz', 'пистолет': 'Pistolet'}
        : {'дождеватель': 'Дождеватель', 'пистолет': 'Пистолет'};
    return map[v] || v || '';
}
function recommendationIcon(zoneType) {
    const icons = {
        lawn: '<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M5 20c1.1-2.8 2.2-5.4 3.4-7.6 1.2 1.4 2.1 3.8 2.6 7.6M10.5 20c0-3.7 1-6.8 2.8-9.3 1.5 2 2.5 5.1 2.9 9.3M15.5 20c.7-2.4 1.8-4.9 3.5-7.4 1 1.7 1.8 4 2.3 7.4" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/></svg>',
        bushes: '<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M7 19a4 4 0 0 1 0-8 5 5 0 0 1 9.5-1.5A4 4 0 1 1 17 19H7zm3-2h4v-4h-4v4z"/></svg>',
        tree: '<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 3l-3 4h2l-3 4h2l-4 5h4l-1 5h6l-1-5h4l-4-5h2l-3-4h2z"/></svg>',
        default: '<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 3l4 8h-3v10h-2V11H8l4-8z"/></svg>'
    };
    return icons[zoneType] || icons.default;
}
function wateringIcon(zoneType) {
    return recommendationIcon(zoneType);
}

function zoneLabel(z) { return (z.code ? z.code + ' - ' : '') + z.name; }
function esc(v) {
    return String(v == null ? '' : v).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function basicAuth() { return 'Basic ' + btoa(USERNAME + ':' + PASSWORD); }
function authHeaders() { return {'Authorization': basicAuth(), 'Content-Type': 'application/json'}; }
function authHeadersNoBody() { return {'Authorization': basicAuth()}; }

async function api(path, opts = {}) {
    const isForm = opts.body instanceof FormData;
    const headers = isForm ? authHeadersNoBody() : authHeaders();
    const r = await fetch(path, {...opts, headers: {...headers, ...(opts.headers || {})}});
    if (r.status === 401) { sessionStorage.removeItem('username'); sessionStorage.removeItem('password'); location.reload(); }
    return r.json();
}

async function doLogin() {
    USERNAME = document.getElementById('login-user').value || 'admin';
    PASSWORD = document.getElementById('login-pass').value;
    try {
        const r = await fetch('/api/login', {method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({username: USERNAME, password: PASSWORD})});
        if (r.ok) {
            const data = await r.json();
            CURRENT_USER = data.user;
            sessionStorage.setItem('username', USERNAME);
            sessionStorage.setItem('password', PASSWORD);
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('main-app').classList.remove('hidden');
            updateUserNav();
            renderLanguageSwitches();
            showTab('dashboard');
        } else {
            document.getElementById('login-error').classList.remove('hidden');
        }
    } catch(e) { document.getElementById('login-error').classList.remove('hidden'); }
}

async function init() {
    USERNAME = sessionStorage.getItem('username') || 'admin';
    PASSWORD = sessionStorage.getItem('password');
    renderLanguageSwitches();
    renderStaticLabels();
    if (PASSWORD) {
        try {
            CURRENT_USER = await api('/api/users/me');
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('main-app').classList.remove('hidden');
            updateUserNav();
            renderLanguageSwitches();
            showTab('dashboard');
        } catch(e) {
            sessionStorage.removeItem('username');
            sessionStorage.removeItem('password');
        }
    }
}

function updateUserNav() {
    document.getElementById('tab-users').classList.toggle('hidden', !CURRENT_USER || CURRENT_USER.role !== 'admin');
}

let currentTab = '';
let editingRequestId = null;
function showTab(tab) {
    currentTab = tab;
    document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
    document.getElementById('tab-' + tab).classList.add('active');
    ({dashboard: renderDashboard, zones: renderZones, watering: renderWatering, mowing: renderMowing, requests: renderRequests, finance: renderFinance, emails: renderEmails, events: renderEvents, users: renderUsers})[tab]();
}

// === DASHBOARD ===
async function renderDashboard() {

                h += '<div class="list-item">' + w.date + ': <span class="badge ' + cls + '">' + maxWind.toFixed(1) + ' kt</span> max';

                h += '</div>';
            });
        }
        if (d.wind.history && d.wind.history.length) {
            h += '<h3>' + t('weather.lastDays') + '</h3>';

                h += '<div class="list-item">' + w.date + ': max ' + Number(w.max_wind_kt || 0).toFixed(1) + ' kt';

            });

function financeBadgeClass(kind, status) {
    if (status === 'reimbursed') return 'badge-green';
    if (status === 'pending') return 'badge-yellow';
    if (status === 'not_needed') return 'badge-gray';
    return kind === 'private' ? 'badge-gray' : 'badge-blue';
}

async function renderFinance() {
    const list = await api('/api/expenses');
    const requests = await api('/api/requests');
    const today = new Date().toISOString().slice(0, 10);
    let h = '<h2>' + t('tabs.finance') + '</h2><div class="card"><h3>' + t('finance.new') + '</h3>';
    h += '<div class="form-group"><label>' + t('labels.date') + '</label><input type="date" id="x-date" value="' + today + '"></div>';
    h += '<div class="form-group"><label>' + t('labels.title') + '</label><input id="x-title"></div>';
    h += '<div class="form-group"><label>' + t('labels.vendor') + '</label><input id="x-vendor"></div>';
    h += '<div class="form-group"><label>' + t('labels.amount') + '</label><input type="number" step="0.01" id="x-amount"></div>';
    h += '<div class="form-group"><label>' + t('labels.currency') + '</label><input id="x-currency" value="PLN"></div>';
    h += '<div class="form-group"><label>' + t('labels.category') + '</label><input id="x-category"></div>';
    h += '<div class="form-group"><label>' + t('labels.kind') + '</label><select id="x-kind"><option value="reimbursable">' + financeSummaryLabel('reimbursable') + '</option><option value="private">' + financeSummaryLabel('private') + '</option></select></div>';
    h += '<div class="form-group"><label>' + t('labels.reimbursementStatus') + '</label><select id="x-status"><option value="pending">' + financeSummaryLabel('pending') + '</option><option value="reimbursed">' + financeSummaryLabel('reimbursed') + '</option><option value="not_needed">' + financeSummaryLabel('notNeeded') + '</option></select></div>';
    h += '<div class="form-group"><label>' + t('labels.request') + '</label><select id="x-request"><option value="">-</option>' + requests.map(r => '<option value="' + r.id + '">' + esc(r.title) + '</option>').join('') + '</select></div>';
    h += '<div class="form-group"><label>' + t('labels.notes') + '</label><textarea id="x-notes"></textarea></div>';
    h += '<div class="form-group"><label>' + t('labels.attachments') + '</label><input type="file" id="x-files" multiple accept="image/*,application/pdf"></div>';
    h += '<button onclick="submitExpense()">' + t('actions.create') + '</button><p id="x-error" class="hidden" style="color:red;margin-top:8px;font-size:14px;"></p></div>';
    h += '<div class="card"><h3>' + t('finance.list') + '</h3>';
    list.forEach(e => {
        const amount = Number(e.amount || 0).toFixed(2) + ' ' + (e.currency || 'PLN');
        const kindCls = e.kind === 'private' ? 'badge-gray' : 'badge-blue';
        const statusCls = financeBadgeClass(e.kind, e.reimbursement_status);
        h += '<div class="list-item"><b>' + esc(e.title) + '</b> <span class="badge ' + kindCls + '">' + financeSummaryLabel(e.kind === 'private' ? 'private' : 'reimbursable') + '</span> <span class="badge ' + statusCls + '">' + financeStatusLabel(e.reimbursement_status) + '</span><br>';
        h += '<small>' + e.date + ' | ' + amount + (e.vendor ? ' | ' + esc(e.vendor) : '') + (e.category ? ' | ' + esc(e.category) : '') + (e.request_title ? ' | ' + financeRequestLabel(true) + ': ' + esc(e.request_title) : '') + '</small>';
        if (e.notes) h += '<br><small>' + esc(e.notes) + '</small>';
        if (e.attachments && e.attachments.length) {
            h += '<br><small>' + e.attachments.map(a => '<a href="/uploads/' + encodeURIComponent(a) + '" target="_blank" rel="noopener">' + esc(a) + '</a>').join(' | ') + '</small>';
        }
        h += '<br><button style="padding:4px 8px;font-size:12px;min-height:auto;margin-top:6px;" onclick="toggleExpenseEditor(' + e.id + ')">&#9998;</button></div>';
        if (editingExpenseId === e.id) {
            h += '<div style="margin-top:10px;">';
            h += '<div class="form-group"><label>' + t('labels.date') + '</label><input type="date" id="xe-date" value="' + esc(e.date || today) + '"></div>';
            h += '<div class="form-group"><label>' + t('labels.title') + '</label><input id="xe-title" value="' + esc(e.title || '') + '"></div>';
            h += '<div class="form-group"><label>' + t('labels.vendor') + '</label><input id="xe-vendor" value="' + esc(e.vendor || '') + '"></div>';
            h += '<div class="form-group"><label>' + t('labels.amount') + '</label><input type="number" step="0.01" id="xe-amount" value="' + esc(e.amount || '') + '"></div>';
            h += '<div class="form-group"><label>' + t('labels.currency') + '</label><input id="xe-currency" value="' + esc(e.currency || 'PLN') + '"></div>';
            h += '<div class="form-group"><label>' + t('labels.category') + '</label><input id="xe-category" value="' + esc(e.category || '') + '"></div>';
            h += '<div class="form-group"><label>' + t('labels.kind') + '</label><select id="xe-kind"><option value="reimbursable"' + (e.kind === 'reimbursable' ? ' selected' : '') + '>' + financeSummaryLabel('reimbursable') + '</option><option value="private"' + (e.kind === 'private' ? ' selected' : '') + '>' + financeSummaryLabel('private') + '</option></select></div>';
            h += '<div class="form-group"><label>' + t('labels.reimbursementStatus') + '</label><select id="xe-status"><option value="pending"' + (e.reimbursement_status === 'pending' ? ' selected' : '') + '>' + financeSummaryLabel('pending') + '</option><option value="reimbursed"' + (e.reimbursement_status === 'reimbursed' ? ' selected' : '') + '>' + financeSummaryLabel('reimbursed') + '</option><option value="not_needed"' + (e.reimbursement_status === 'not_needed' ? ' selected' : '') + '>' + financeSummaryLabel('notNeeded') + '</option></select></div>';
            h += '<div class="form-group"><label>' + t('labels.request') + '</label><select id="xe-request"><option value="">-</option>' + requests.map(r => '<option value="' + r.id + '"' + (Number(e.request_id) === Number(r.id) ? ' selected' : '') + '>' + esc(r.title) + '</option>').join('') + '</select></div>';
            h += '<div class="form-group"><label>' + t('labels.notes') + '</label><textarea id="xe-notes">' + esc(e.notes || '') + '</textarea></div>';
            h += '<div class="form-group"><label>' + t('labels.attachments') + '</label><input type="file" id="xe-files" multiple accept="image/*,application/pdf"></div>';
            h += '<button onclick="saveExpense(' + e.id + ')" style="margin-right:8px;">' + t('actions.save') + '</button>';
            h += '<button onclick="deleteExpense(' + e.id + ')" style="background:#c62828;">' + t('actions.delete') + '</button>';
            h += '<p style="font-size:12px;color:#666;margin-top:6px;">' + (LANG === 'pl' ? 'Nowe pliki zostaną dodane do istniejących.' : 'Новые файлы будут добавлены к существующим.') + '</p>';
            h += '</div>';
        }
    });
    h += '</div>';
    document.getElementById('app').innerHTML = h;
}

async function submitExpense() {
    const err = document.getElementById('x-error');
    err.classList.add('hidden');
    const fd = new FormData();
    fd.append('date', document.getElementById('x-date').value);
    fd.append('title', document.getElementById('x-title').value.trim());
    fd.append('amount', document.getElementById('x-amount').value);
    fd.append('currency', document.getElementById('x-currency').value.trim() || 'PLN');
    const vendor = document.getElementById('x-vendor').value.trim(); if (vendor) fd.append('vendor', vendor);
    const category = document.getElementById('x-category').value.trim(); if (category) fd.append('category', category);
    fd.append('kind', document.getElementById('x-kind').value);
    fd.append('reimbursement_status', document.getElementById('x-status').value);
    const req = document.getElementById('x-request').value; if (req) fd.append('request_id', req);
    const notes = document.getElementById('x-notes').value.trim(); if (notes) fd.append('notes', notes);
    const files = document.getElementById('x-files').files;
    for (let i = 0; i < files.length; i++) fd.append('attachments', files[i]);
    const r = await fetch('/api/expenses', {method:'POST', headers: authHeadersNoBody(), body: fd});
    if (!r.ok) {
        err.textContent = LANG === 'pl' ? 'Nie udało się dodać wydatku' : 'Не удалось добавить трату';
        err.classList.remove('hidden');
        return;
    }
    renderFinance();
}

function toggleExpenseEditor(id) {
    editingExpenseId = editingExpenseId === id ? null : id;
    renderFinance();
}

async function saveExpense(id) {
    const fd = new FormData();
    fd.append('date', document.getElementById('xe-date').value);
    fd.append('title', document.getElementById('xe-title').value.trim());
    fd.append('amount', document.getElementById('xe-amount').value);
    fd.append('currency', document.getElementById('xe-currency').value.trim() || 'PLN');
    const vendor = document.getElementById('xe-vendor').value.trim(); if (vendor) fd.append('vendor', vendor);
    const category = document.getElementById('xe-category').value.trim(); if (category) fd.append('category', category);
    fd.append('kind', document.getElementById('xe-kind').value);
    fd.append('reimbursement_status', document.getElementById('xe-status').value);
    const req = document.getElementById('xe-request').value; if (req) fd.append('request_id', req);
    const notes = document.getElementById('xe-notes').value.trim(); if (notes) fd.append('notes', notes);
    const files = document.getElementById('xe-files').files;
    for (let i = 0; i < files.length; i++) fd.append('attachments', files[i]);
    await fetch('/api/expenses/' + id, {method:'PUT', headers: authHeadersNoBody(), body: fd});
    editingExpenseId = null;
    renderFinance();
}

async function deleteExpense(id) {
    if (!confirm(LANG === 'pl' ? 'Usunąć wydatek?' : 'Удалить трату?')) return;
    await api('/api/expenses/' + id, {method:'DELETE'});
    editingExpenseId = null;
    renderFinance();
}

// === EMAILS ===
async function renderEmails() {
    const list = await api('/api/emails');
    const reqs = await api('/api/requests');
    let h = '<h2>' + t('tabs.emails') + '</h2>';
    h += '<div class="card"><div class="form-group"><label>' + t('labels.filterRequest') + '</label><select id="e-filter" onchange="filterEmails()"><option value="">' + t('requests.all') + '</option>' + reqs.map(r => '<option value="' + r.id + '">' + r.title + '</option>').join('') + '</select></div></div>';
    h += '<div class="card"><h3>' + t('actions.save') + '</h3>';
    h += '<div class="form-group"><label>' + t('labels.request') + '</label><select id="e-req"><option value="">-</option>' + reqs.map(r => '<option value="' + r.id + '">' + r.title + '</option>').join('') + '</select></div>';
    h += '<div class="form-group"><label>' + t('labels.direction') + '</label><select id="e-dir"><option value="outgoing">' + directionLabel('outgoing') + '</option><option value="incoming">' + directionLabel('incoming') + '</option></select></div>';
    h += '<div class="form-group"><label>' + t('labels.sender') + '</label><input id="e-sender"></div>';
    h += '<div class="form-group"><label>' + t('labels.recipient') + '</label><input id="e-recip"></div>';
    h += '<div class="form-group"><label>' + t('labels.subject') + '</label><input id="e-subj"></div>';
    h += '<div class="form-group"><label>' + t('labels.body') + '</label><textarea id="e-body"></textarea></div>';
    h += '<div class="form-group"><label>' + t('labels.attachments') + '</label><input type="file" id="e-attach" multiple></div>';
    h += '<button onclick="submitEmail()">' + t('actions.save') + '</button></div>';
    h += '<div class="card" id="email-list"><h3>' + t('dashboard.archive') + '</h3>';
    list.slice(0, 30).forEach(e => { h += '<div class="list-item">' + (e.direction==='outgoing'?'&#8594;':'&#8592;') + ' <b>' + (e.subject||'(без темы)') + '</b><br><small>' + (e.sender||'') + ' &rarr; ' + (e.recipient||'') + ' | ' + (e.sent_at||'') + '</small></div>'; });
    h += '</div>';
    document.getElementById('app').innerHTML = h;
}
async function filterEmails() {
    const rid = document.getElementById('e-filter').value;
    const list = await api(rid ? '/api/emails?request_id=' + rid : '/api/emails');
    let h = '<h3>' + t('dashboard.archive') + '</h3>';
    list.forEach(e => { h += '<div class="list-item">' + (e.direction==='outgoing'?'&#8594;':'&#8592;') + ' <b>' + (e.subject||'(без темы)') + '</b><br><small>' + (e.sender||'') + ' &rarr; ' + (e.recipient||'') + ' | ' + (e.sent_at||'') + '</small></div>'; });
    document.getElementById('email-list').innerHTML = h;
}
async function submitEmail() {
    const fd = new FormData();
    const req = document.getElementById('e-req').value; if(req) fd.append('request_id', req);
    fd.append('direction', document.getElementById('e-dir').value);
    fd.append('sender', document.getElementById('e-sender').value);
    fd.append('recipient', document.getElementById('e-recip').value);
    fd.append('subject', document.getElementById('e-subj').value);
    fd.append('body', document.getElementById('e-body').value);
    fd.append('sent_at', new Date().toISOString());
    const files = document.getElementById('e-attach').files;
    for(let i=0;i<files.length;i++) fd.append('attachments', files[i]);
    await fetch('/api/emails', {method:'POST', headers: authHeadersNoBody(), body: fd});
    renderEmails();
}

// === EVENTS ===
async function renderEvents() {
    const list = await api('/api/events');
    let h = '<h2>' + t('tabs.events') + '</h2><div class="card">';
    if(!list.length) h += '<p>' + t('none') + '</p>';
    list.forEach(e => {
        const lbl = eventLabel(e.type) || e.type || '?';
        const cls = e.type==='watering'?'badge-blue':e.type==='mowing'?'badge-green':'badge-yellow';
        h += '<div class="list-item"><span class="badge ' + cls + '">' + lbl + '</span> <b>' + e.title + '</b><br><small>' + (e.date||'') + (e.description ? ' - ' + e.description : '') + '</small></div>';
    });
    h += '</div>';
    document.getElementById('app').innerHTML = h;
}

// === USERS ===
async function renderUsers() {
    const list = await api('/api/users');
    let h = '<h2>' + t('tabs.users') + '</h2><div class="card"><h3>' + t('users.new') + '</h3>';
    h += '<div class="form-group"><label>' + t('labels.username') + '</label><input id="u-username" autocomplete="off"></div>';
    h += '<div class="form-group"><label>' + t('labels.displayName') + '</label><input id="u-display" autocomplete="off"></div>';
    h += '<div class="form-group"><label>' + t('labels.password') + '</label><input type="password" id="u-password" autocomplete="new-password"></div>';
    h += '<div class="form-group"><label>' + t('labels.role') + '</label><select id="u-role"><option value="member">' + t('users.member') + '</option><option value="admin">' + t('users.admin') + '</option></select></div>';
    h += '<button onclick="submitUser()">' + t('actions.create') + '</button><p id="u-error" class="hidden" style="color:red;margin-top:8px;font-size:14px;"></p></div>';
    h += '<div class="card"><h3>' + t('users.list') + '</h3>';
    list.forEach(u => {
        const role = u.role === 'admin' ? t('users.admin') : t('users.member');
        const cls = u.role === 'admin' ? 'badge-blue' : 'badge-gray';
        h += '<div class="list-item"><b>' + u.username + '</b> <span class="badge ' + cls + '">' + role + '</span><br><small>' + (u.display_name || '') + (u.active ? '' : ' | отключен') + '</small></div>';
    });
    h += '</div>';
    document.getElementById('app').innerHTML = h;
}

async function submitUser() {
    const err = document.getElementById('u-error');
    err.classList.add('hidden');
    const data = {
        username: document.getElementById('u-username').value.trim(),
        display_name: document.getElementById('u-display').value.trim(),
        password: document.getElementById('u-password').value,
        role: document.getElementById('u-role').value
    };
    const r = await fetch('/api/users', {method:'POST', headers: authHeaders(), body: JSON.stringify(data)});
    if (!r.ok) {
        const body = await r.json().catch(() => ({}));
        err.textContent = body.detail || t('dashboard.errorCreateUser');
        err.classList.remove('hidden');
        return;
    }
    renderUsers();
}

init();
</script>
