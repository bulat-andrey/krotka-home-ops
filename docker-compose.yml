services:
  app:
    build:
      context: ./backend
    ports:
      - "${HOST_BIND:-127.0.0.1}:${HOST_PORT:-8010}:8000"
    volumes:
      - ./data:/data
      - ./frontend:/app/static
    environment:
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      AUTH_PASSWORD: ${AUTH_PASSWORD:?Set AUTH_PASSWORD in .env before starting Home Ops}
      DB_PATH: ${DB_PATH:-/data/krotka.db}
      LATITUDE: ${LATITUDE:-52.2297}
      LONGITUDE: ${LONGITUDE:-21.0122}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      app:
        condition: service_healthy
    restart: unless-stopped

volumes:
  caddy_data:
  caddy_config:
